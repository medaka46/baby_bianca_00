{% extends "base.html" %}

{% block content %}
<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }
    main.tab_00 {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-height: 0;
    }
    .scrollable-content {
        flex: 1;
        overflow-y: auto;
        padding-bottom: 0;
        scrollbar-width: thin;
        scrollbar-color: #666 #333;
    }
    .scrollable-content::-webkit-scrollbar { width: 8px; }
    .scrollable-content::-webkit-scrollbar-track { background: #333; }
    .scrollable-content::-webkit-scrollbar-thumb { background: #666; border-radius: 4px; }
</style>

<header class="tab_00">
    <div style="display: flex;">
        <form action="/action/map/" method="get">
            <button type="submit" style="background-color: #444; color: {{ '#0f0' if function_sub_tab_active == 'map' else '#aaa' }};">World Map</button>
        </form>
        <form action="/action/periodic_table/" method="get">
            <button type="submit" style="background-color: #444; color: {{ '#0f0' if function_sub_tab_active == 'periodic_table' else '#aaa' }};">Periodic Table</button>
        </form>
    </div>
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 5px;">
        <div class="title_00" style="margin: 0;">Function</div>
        <div class="title_00" style="margin: 0;">{{ today }}</div>
        <div id="clock_function" class="title_00" style="margin: 0;"></div>
    </div>
</header>

<script>
    function updateClockFunction() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('clock_function').textContent = `${h}:${m}:${s}`;
    }
    updateClockFunction();
    setInterval(updateClockFunction, 1000);
</script>

<main class="tab_00">
    <div class="scrollable-content" style="padding: 12px;">
        <div style="color: #aaa; font-size: 13px;">Select a sub-tag above.</div>
    </div>
</main>
{% endblock %}
