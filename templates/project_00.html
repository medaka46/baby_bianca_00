{% extends "base.html" %}

{% block content %}
<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }
    main.tab_00 {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-height: 0;
    }
    .scrollable-content {
        flex: 1;
        overflow-y: auto;
        max-height: none;
        padding-bottom: 0;
        scrollbar-width: thin;
        scrollbar-color: #666 #333;
    }
    .scrollable-content::-webkit-scrollbar { width: 8px; }
    .scrollable-content::-webkit-scrollbar-track { background: #333; }
    .scrollable-content::-webkit-scrollbar-thumb { background: #666; border-radius: 4px; }

    #drop-zone {
        border: 1px solid #999;
        border-radius: 5px;
        padding: 7px 15px;
        text-align: center;
        color: #888;
        font-size: 13px;
        cursor: pointer;
        transition: border-color 0.2s, background-color 0.2s;
        margin: 0 auto 12px auto;
        user-select: none;
        width: 25%;
    }
    #drop-zone.drag-over {
        border-color: #0f0;
        background-color: #1a2a1a;
        color: #0f0;
    }

    .proj-btn {
        background-color: #444;
        color: #0f0;
        border: 1px solid #666;
        padding: 4px 12px;
        cursor: pointer;
        font-size: 12px;
        border-radius: 4px;
    }
    .proj-btn:hover { background-color: #555; }

    .info-row {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 12px;
        color: #aaa;
        flex-wrap: wrap;
    }
    .badge {
        background-color: #333;
        border: 1px solid #555;
        border-radius: 3px;
        padding: 2px 8px;
        font-size: 11px;
        color: #0f0;
    }
    .col-tag {
        background-color: #2a2a2a;
        border: 1px solid #444;
        border-radius: 3px;
        padding: 2px 8px;
        font-size: 11px;
        color: #ccc;
        margin: 2px;
        display: inline-block;
        cursor: pointer;
        user-select: none;
    }
    .col-tag.col-hidden {
        color: #555;
        text-decoration: line-through;
        background-color: #1a1a1a;
        border-color: #333;
    }
    .col-tag.col-filter {
        border-color: #ff0;
        color: #ff0;
        background-color: #2a2a00;
    }

    /* Filter condition bar */
    #select-conditions {
        display: none;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        margin: 8px 0 4px 0;
        padding: 6px 8px;
        background-color: #1e1e00;
        border: 1px solid #555500;
        border-radius: 4px;
    }
    .filter-chip {
        display: flex;
        align-items: center;
        gap: 4px;
        background-color: #2a2a00;
        border: 1px solid #666600;
        border-radius: 4px;
        padding: 3px 6px;
        font-size: 11px;
    }
    .filter-chip-name {
        color: #ff0;
        font-weight: bold;
        white-space: nowrap;
    }
    .filter-op {
        background-color: #333;
        color: #0f0;
        border: 1px solid #555;
        border-radius: 3px;
        padding: 1px 3px;
        font-size: 11px;
        cursor: pointer;
    }
    .filter-val {
        background-color: #333;
        color: #fff;
        border: 1px solid #555;
        border-radius: 3px;
        padding: 1px 5px;
        font-size: 11px;
        width: 100px;
    }
    .filter-val:focus { outline: 1px solid #ff0; border-color: #ff0; }
    .filter-toggle {
        border: 1px solid #666;
        border-radius: 3px;
        padding: 1px 6px;
        font-size: 11px;
        cursor: pointer;
    }
    .filter-toggle.on  { background-color: #004400; color: #0f0; border-color: #0f0; }
    .filter-toggle.off { background-color: #333;    color: #666; border-color: #555; }
    .filter-remove {
        background: none;
        border: none;
        color: #888;
        cursor: pointer;
        font-size: 12px;
        padding: 0 2px;
        line-height: 1;
    }
    .filter-remove:hover { color: #f00; }

    /* Data table */
    .data-table-wrap {
        margin-top: 14px;
        border: 1px solid #444;
        border-radius: 4px;
        overflow: hidden;
    }
    .data-table-scroll {
        max-height: 400px;
        overflow-y: auto;
        overflow-x: auto;
        scrollbar-width: thin;
        scrollbar-color: #666 #333;
    }
    .data-table-scroll::-webkit-scrollbar { height: 8px; width: 8px; }
    .data-table-scroll::-webkit-scrollbar-track { background: #333; }
    .data-table-scroll::-webkit-scrollbar-thumb { background: #666; border-radius: 4px; }
    .data-table {
        width: auto;
        table-layout: fixed;
        border-collapse: collapse;
        font-size: 12px;
        color: #ccc;
    }
    .data-table th {
        background-color: #333;
        color: #0f0;
        padding: 6px 10px;
        text-align: left;
        white-space: nowrap;
        border-bottom: 1px solid #555;
        position: sticky;
        top: 0;
        z-index: 1;
        min-width: 0;
        max-width: 0;
        overflow: hidden;
        cursor: pointer;
        user-select: none;
    }
    .data-table th:hover { background-color: #3a3a3a; }
    .sort-indicator {
        display: inline-block;
        margin-left: 4px;
        font-size: 10px;
        color: #0f0;
        opacity: 0.4;
    }
    .sort-indicator.active { opacity: 1; }
    .resize-handle {
        position: absolute;
        top: 0;
        right: 0;
        width: 8px;
        height: 100%;
        cursor: col-resize;
        user-select: none;
        background-color: #555;
        opacity: 0.5;
    }
    .resize-handle:hover, .resize-handle.active {
        background-color: #0f0;
        opacity: 1;
    }
    .data-table td {
        padding: 5px 10px;
        border-bottom: 1px solid #2a2a2a;
        white-space: nowrap;
        color: #0f0;
        max-width: 0;
        overflow: hidden;
    }
    .data-table tr:hover td { background-color: #2a2a2a; }
    select.proj-select {
        background-color: #444;
        color: #0f0;
        border: 1px solid #666;
        padding: 4px 8px;
        font-size: 12px;
        border-radius: 4px;
        cursor: pointer;
    }
    #tableHeight {
        -webkit-appearance: none;
        appearance: none;
        height: 6px;
        border-radius: 3px;
        outline: none;
        background-color: #444;
    }
    #tableHeight::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #0f0;
        cursor: pointer;
    }
    #tableHeight::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #0f0;
        cursor: pointer;
        border: none;
    }
</style>

<header class="tab_00">
    <div style="display: flex;">
        <form action="/project/" method="get">
            <button type="submit" style="background-color: #444; color: {{ '#0f0' if project_sub_tab_active == 'sort_select' else '#aaa' }};">Sort/Select</button>
        </form>
        <form action="/project/edit/" method="get">
            <button type="submit" style="background-color: #444; color: {{ '#0f0' if project_sub_tab_active == 'edit' else '#aaa' }};">Edit</button>
        </form>
        <form action="/project/chart/" method="get">
            <button type="submit" style="background-color: #444; color: {{ '#0f0' if project_sub_tab_active == 'chart' else '#aaa' }};">Chart</button>
        </form>
    </div>
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 5px;">
        <div class="title_00" style="margin: 0;">Project</div>
        <div style="display: flex; align-items: center; gap: 5px; margin-left: auto;">
            <label style="color: #0f0; font-size: 11px;">Table Height:</label>
            <input type="range" id="tableHeight" min="400" max="1000" value="400" style="width: 100px;">
            <span id="tableHeightValue" style="color: #0f0; font-size: 11px; min-width: 40px;">400px</span>
        </div>
    </div>
</header>

<main class="tab_00">
    <div class="scrollable-content" style="padding: 12px;">
        <div style="width: 100%">

            <!-- Drop zone -->
            <div id="drop-zone" onclick="document.getElementById('file-input').click()">
                <div style="font-size: 16px; margin-bottom: 2px;">&#8659;</div>
                <div>Drag a file here or click to select</div>
                <div style="font-size: 11px; color: #666; margin-top: 2px;">Supported: .xlsx, .xls, .csv, .db, .sqlite, .sqlite3</div>
            </div>
            <input type="file" id="file-input" accept=".xlsx,.xls,.csv,.db,.sqlite,.sqlite3" style="display:none;">

            <!-- Progress bar -->
            <div id="progress-wrap" style="display: none; width: 25%; margin: 0 auto 6px auto;">
                <div style="background-color: #333; border-radius: 4px; height: 8px; overflow: hidden;">
                    <div id="progress-bar" style="height: 100%; width: 0%; background-color: #0f0; border-radius: 4px; transition: width 0.3s ease;"></div>
                </div>
                <div id="progress-label" style="color: #aaa; font-size: 11px; margin-top: 3px; text-align: center;">0%</div>
            </div>

            <!-- Status -->
            <div id="upload-status" style="font-size: 12px; color: #aaa; margin-bottom: 10px; text-align: center;"></div>

            <!-- Result area (shown after upload) -->
            <div id="result-area" style="display: none;">

                <!-- File info -->
                <div class="info-row" style="margin-bottom: 10px;">
                    <span style="color: #888;">File:</span>
                    <span id="info-filename" style="color: #fff;"></span>
                    <span class="badge" id="info-filetype"></span>
                </div>

                <!-- Sheet selector (Excel / SQLite only) -->
                <div id="sheet-row" style="display: none; margin-bottom: 12px;" class="info-row">
                    <span style="color: #888;">Sheet / Table:</span>
                    <select id="sheet-select" class="proj-select"></select>
                    <button class="proj-btn" onclick="loadColumns()">Select</button>
                </div>

                <!-- Columns display -->
                <div id="columns-area" style="display: none;">
                    <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 6px;">
                        <span style="color: #888; font-size: 11px;">Columns</span>
                        <span id="row-count" style="font-size: 12px; color: #0f0; font-weight: bold;"></span>
                    </div>
                    <div id="columns-list"></div>

                    <!-- Filter condition bar -->
                    <div id="select-conditions"></div>

                    <!-- Chart options bar -->
                    <div id="chart-options" style="display:none; align-items:center; gap:10px; padding:6px 8px; margin:4px 0; background-color:#1a1a2e; border:1px solid #333366; border-radius:4px; flex-wrap:wrap;">
                        <span style="color:#88f; font-size:11px;">Category:</span>
                        <select id="chart-category-select" class="proj-select">
                            <option value="">-- select --</option>
                            <option value="basic">Basic</option>
                            <option value="3d">3D</option>
                        </select>
                        <span id="chart-type-label" style="color:#88f; font-size:11px; display:none;">Type:</span>
                        <select id="chart-type-select" class="proj-select" style="display:none;"></select>
                        <span id="chart-x-label" style="color:#88f; font-size:11px; display:none;">X:</span>
                        <select id="chart-x-select" class="proj-select" style="display:none;"></select>
                        <span id="chart-y-label" style="color:#88f; font-size:11px; display:none;">Y:</span>
                        <select id="chart-y-select" class="proj-select" style="display:none;"></select>
                        <span id="chart-z-label" style="color:#88f; font-size:11px; display:none;">Z:</span>
                        <select id="chart-z-select" class="proj-select" style="display:none;"></select>
                        <span id="chart-label-label" style="color:#88f; font-size:11px; display:none;">Label 1:</span>
                        <select id="chart-label-select" class="proj-select" style="display:none;"></select>
                        <span id="chart-label2-label" style="color:#88f; font-size:11px; display:none;">2:</span>
                        <select id="chart-label2-select" class="proj-select" style="display:none;"></select>
                        <span id="chart-label3-label" style="color:#88f; font-size:11px; display:none;">3:</span>
                        <select id="chart-label3-select" class="proj-select" style="display:none;"></select>
                        <button id="chart-draw-btn" class="proj-btn" style="display:none;">Draw</button>
                    </div>

                    <!-- Data table -->
                    <div class="data-table-wrap">
                        <div class="data-table-scroll">
                            <table class="data-table">
                                <colgroup id="table-cols"></colgroup>
                                <thead id="table-head"></thead>
                                <tbody id="table-body"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </div>
</main>

<script>
    let uploadedFile = null;
    let _allRows = [];          // original unfiltered rows
    let _currentRows = [];      // rows after filtering (and sorting)
    let _currentColumns = [];
    let _sortCol = null;
    let _sortDir = 1;           // 1 = asc, -1 = desc
    let _filterConditions = {}; // { colName: { op, value, active } }

    // --- Drop zone ---
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        const f = e.dataTransfer.files[0];
        if (f) handleFile(f);
    });
    fileInput.addEventListener('change', () => {
        if (fileInput.files[0]) handleFile(fileInput.files[0]);
    });

    // --- Progress bar helpers ---
    function setProgress(pct, visible) {
        const wrap = document.getElementById('progress-wrap');
        const bar  = document.getElementById('progress-bar');
        const lbl  = document.getElementById('progress-label');
        wrap.style.display = visible ? 'block' : 'none';
        bar.style.width = pct + '%';
        lbl.textContent = pct + '%';
    }

    // --- XHR helper ---
    function xhrPost(url, formData, onProgress, onDone, onError) {
        const xhr = new XMLHttpRequest();
        xhr.upload.addEventListener('progress', (e) => {
            if (e.lengthComputable) onProgress(Math.round(e.loaded / e.total * 80));
        });
        xhr.addEventListener('load', () => {
            if (xhr.status === 200) {
                onProgress(100);
                onDone(JSON.parse(xhr.responseText));
            } else {
                onError('Server error: ' + xhr.status);
            }
        });
        xhr.addEventListener('error', () => onError('Network error'));
        xhr.open('POST', url);
        xhr.send(formData);
    }

    // --- Handle file upload ---
    function handleFile(file) {
        uploadedFile = file;
        sessionStorage.removeItem('proj_filename');
        sessionStorage.removeItem('proj_filetype');
        sessionStorage.removeItem('proj_columns');
        sessionStorage.removeItem('proj_rows');
        sessionStorage.removeItem('proj_hidden_cols');
        sessionStorage.removeItem('proj_filter_conditions');
        sessionStorage.removeItem('proj_chart_open');
        sessionStorage.removeItem('proj_chart_axis_open');
        sessionStorage.removeItem('proj_chart_category');
        sessionStorage.removeItem('proj_chart_type');
        sessionStorage.removeItem('proj_chart_x');
        sessionStorage.removeItem('proj_chart_y');
        sessionStorage.removeItem('proj_chart_z');
        sessionStorage.removeItem('proj_chart_label');
        sessionStorage.removeItem('proj_chart_label_2');
        sessionStorage.removeItem('proj_chart_label_3');
        sessionStorage.removeItem('proj_chart_rows');
        setStatus('Reading file...', '#ff0');
        setProgress(0, true);
        document.getElementById('result-area').style.display = 'none';

        const formData = new FormData();
        formData.append('file', file);

        xhrPost('/project/upload/', formData,
            (pct) => setProgress(pct, true),
            (data) => {
                setProgress(0, false);
                if (data.error) { setStatus('Error: ' + data.error, '#f00'); return; }
                setStatus('', '');
                document.getElementById('result-area').style.display = 'block';
                document.getElementById('info-filename').textContent = file.name;
                document.getElementById('info-filetype').textContent = data.file_type.toUpperCase();
                if (data.sheets) {
                    const sel = document.getElementById('sheet-select');
                    sel.innerHTML = data.sheets.map(s => `<option value="${s}">${s}</option>`).join('');
                    document.getElementById('sheet-row').style.display = 'flex';
                    document.getElementById('columns-area').style.display = 'none';
                } else if (data.columns) {
                    document.getElementById('sheet-row').style.display = 'none';
                    sessionStorage.removeItem('proj_hidden_cols');
                    saveToSession(file.name, data.file_type.toUpperCase(), data.columns, data.rows);
                    showColumns(data.columns, data.rows);
                }
            },
            (err) => { setProgress(0, false); setStatus(err, '#f00'); }
        );
    }

    // --- Load columns for selected sheet ---
    function loadColumns() {
        if (!uploadedFile) return;
        const sheet = document.getElementById('sheet-select').value;
        const formData = new FormData();
        formData.append('file', uploadedFile);
        formData.append('sheet', sheet);

        setStatus('Loading columns...', '#ff0');
        setProgress(0, true);

        xhrPost('/project/columns/', formData,
            (pct) => setProgress(pct, true),
            (data) => {
                setProgress(0, false);
                setStatus('', '');
                if (data.error) { setStatus('Error: ' + data.error, '#f00'); return; }
                sessionStorage.removeItem('proj_hidden_cols');
                sessionStorage.removeItem('proj_filter_conditions');
                saveToSession(uploadedFile.name, (sessionStorage.getItem('proj_filetype') || ''), data.columns, data.rows);
                showColumns(data.columns, data.rows);
            },
            (err) => { setProgress(0, false); setStatus(err, '#f00'); }
        );
    }

    function saveToSession(filename, filetype, columns, rows) {
        try {
            sessionStorage.setItem('proj_filename', filename);
            sessionStorage.setItem('proj_filetype', filetype);
            sessionStorage.setItem('proj_columns', JSON.stringify(columns));
            sessionStorage.setItem('proj_rows', JSON.stringify(rows));
        } catch(e) { /* storage full or unavailable */ }
    }

    function renderFilterConditions() {
        const area = document.getElementById('select-conditions');
        area.style.display = 'flex';
        const ops = ['contains', '=', '!=', '>', '<', '>=', '<='];
        const chips = Object.keys(_filterConditions).map(col => {
            const c = _filterConditions[col];
            return `<div class="filter-chip">
                <span class="filter-chip-name">${col}</span>
                <select class="filter-op" data-col="${col}">
                    ${ops.map(op => `<option${c.op === op ? ' selected' : ''}>${op}</option>`).join('')}
                </select>
                <input class="filter-val" type="text" data-col="${col}" value="${c.value.replace(/"/g,'&quot;')}" placeholder="value...">
                <button class="filter-toggle ${c.active ? 'on' : 'off'}" data-col="${col}">${c.active ? 'ON' : 'OFF'}</button>
                <button class="filter-remove" data-col="${col}">✕</button>
            </div>`;
        }).join('');
        area.innerHTML = chips +
            `<button id="draw-chart-btn" class="proj-btn">Chart</button>`;
    }

    function applyFilters() {
        const activeConds = Object.entries(_filterConditions)
            .filter(([, c]) => c.active && c.value !== '');
        if (activeConds.length === 0) {
            _currentRows = _allRows.slice();
        } else {
            _currentRows = _allRows.filter(row =>
                activeConds.every(([col, cond]) => {
                    const cv = String(row[col] ?? '');
                    const fv = cond.value;
                    const n = parseFloat(cv), fn = parseFloat(fv);
                    const nums = !isNaN(n) && !isNaN(fn);
                    switch (cond.op) {
                        case 'contains': return cv.toLowerCase().includes(fv.toLowerCase());
                        case '=':  return nums ? n === fn : cv === fv;
                        case '!=': return nums ? n !== fn : cv !== fv;
                        case '>':  return nums ? n >  fn : cv >  fv;
                        case '<':  return nums ? n <  fn : cv <  fv;
                        case '>=': return nums ? n >= fn : cv >= fv;
                        case '<=': return nums ? n <= fn : cv <= fv;
                    }
                    return true;
                })
            );
        }
        if (_sortCol) {
            _currentRows.sort(function(a, b) {
                const va = a[_sortCol] ?? '', vb = b[_sortCol] ?? '';
                const na = parseFloat(va), nb = parseFloat(vb);
                if (!isNaN(na) && !isNaN(nb)) return (na - nb) * _sortDir;
                return String(va).localeCompare(String(vb)) * _sortDir;
            });
        }
        renderBody();
        const total = _allRows.length;
        const shown = _currentRows.length;
        document.getElementById('row-count').textContent =
            shown === total ? total + ' rows' : shown + ' / ' + total + ' rows';
        try { sessionStorage.setItem('proj_filter_conditions', JSON.stringify(_filterConditions)); } catch(e) {}
    }

    function renderBody() {
        const tbody = document.getElementById('table-body');
        const hiddenIdxs = JSON.parse(sessionStorage.getItem('proj_hidden_cols') || '[]');
        if (_currentRows.length > 0) {
            tbody.innerHTML = _currentRows.map(row =>
                '<tr>' + _currentColumns.map((c, i) =>
                    `<td${hiddenIdxs.includes(i) ? ' style="display:none;"' : ''}>${row[c] ?? ''}</td>`
                ).join('') + '</tr>'
            ).join('');
        } else {
            tbody.innerHTML = '<tr><td colspan="' + _currentColumns.length + '" style="color:#555; padding:10px;">No data</td></tr>';
        }
    }

    function sortBy(colName) {
        if (_sortCol === colName) {
            _sortDir *= -1;
        } else {
            _sortCol = colName;
            _sortDir = 1;
        }
        _currentRows.sort(function(a, b) {
            const va = a[colName] ?? '';
            const vb = b[colName] ?? '';
            const na = parseFloat(va);
            const nb = parseFloat(vb);
            if (!isNaN(na) && !isNaN(nb)) return (na - nb) * _sortDir;
            return String(va).localeCompare(String(vb)) * _sortDir;
        });
        renderBody();
        // Update sort indicators
        document.querySelectorAll('#table-head th').forEach(function(th) {
            const ind = th.querySelector('.sort-indicator');
            if (!ind) return;
            if (th.dataset.colName === colName) {
                ind.textContent = _sortDir === 1 ? '▲' : '▼';
                ind.classList.add('active');
            } else {
                ind.textContent = '▲';
                ind.classList.remove('active');
            }
        });
    }

    function showColumns(columns, rows, skipSave) {
        _currentColumns = columns.slice();
        _allRows = (rows || []).slice();
        _currentRows = _allRows.slice();
        _sortCol = null;
        _sortDir = 1;
        _filterConditions = {};

        const area = document.getElementById('columns-area');
        const list = document.getElementById('columns-list');
        list.innerHTML = columns.map((c, i) => `<span class="col-tag" data-col="${i}">${c}</span>`).join('');

        // Build colgroup
        const colgroup = document.getElementById('table-cols');
        colgroup.innerHTML = columns.map(() => `<col style="width:150px;">`).join('');

        // Build table header with resize handles and sort indicators
        const thead = document.getElementById('table-head');
        thead.innerHTML = '<tr>' + columns.map(c =>
            `<th style="width:150px;max-width:150px;" data-col-name="${c}">${c}<span class="sort-indicator">▲</span><div class="resize-handle"></div></th>`
        ).join('') + '</tr>';

        // Build table body
        renderBody();
        if (_currentRows.length > 0) {
            document.getElementById('row-count').textContent = _currentRows.length + ' rows';
        } else {
            document.getElementById('row-count').textContent = '';
        }

        area.style.display = 'block';
        renderFilterConditions();
        initResizable();

        // Sort on header click (ignore clicks on resize handle)
        document.querySelectorAll('#table-head th').forEach(function(th) {
            th.addEventListener('click', function(e) {
                if (e.target.classList.contains('resize-handle')) return;
                sortBy(th.dataset.colName);
            });
        });

        // Restore hidden columns from session
        const savedHidden = JSON.parse(sessionStorage.getItem('proj_hidden_cols') || '[]');
        savedHidden.forEach(function(idx) {
            const tag = list.querySelector(`.col-tag[data-col="${idx}"]`);
            if (tag) tag.classList.add('col-hidden');
            const ths = document.querySelectorAll('#table-head tr th');
            if (ths[idx]) ths[idx].style.display = 'none';
            document.querySelectorAll('#table-body tr').forEach(function(tr) {
                const td = tr.querySelectorAll('td')[idx];
                if (td) td.style.display = 'none';
            });
        });

        // Column tag click: normal = hide/show, Shift = toggle filter
        list.querySelectorAll('.col-tag').forEach(function(tag) {
            tag.addEventListener('click', function(e) {
                const idx = parseInt(tag.getAttribute('data-col'));
                const colName = _currentColumns[idx];

                if (e.shiftKey) {
                    // Toggle as filter column
                    if (_filterConditions[colName]) {
                        delete _filterConditions[colName];
                        tag.classList.remove('col-filter');
                    } else {
                        _filterConditions[colName] = { op: 'contains', value: '', active: true };
                        tag.classList.add('col-filter');
                    }
                    renderFilterConditions();
                    applyFilters();
                } else {
                    // Hide/show column
                    const hidden = tag.classList.toggle('col-hidden');
                    const display = hidden ? 'none' : '';
                    const ths = document.querySelectorAll('#table-head tr th');
                    if (ths[idx]) ths[idx].style.display = display;
                    document.querySelectorAll('#table-body tr').forEach(function(tr) {
                        const td = tr.querySelectorAll('td')[idx];
                        if (td) td.style.display = display;
                    });
                    const hiddenIdxs = [];
                    list.querySelectorAll('.col-tag.col-hidden').forEach(function(t) {
                        hiddenIdxs.push(parseInt(t.getAttribute('data-col')));
                    });
                    sessionStorage.setItem('proj_hidden_cols', JSON.stringify(hiddenIdxs));
                }
            });
        });
    }

    // --- Column resize ---
    let _resizing = null;

    document.addEventListener('mousemove', function(e) {
        if (!_resizing) return;
        const newW = Math.max(10, _resizing.startW + (e.clientX - _resizing.startX));
        _resizing.th.style.width = newW + 'px';
        _resizing.th.style.minWidth = '0';
        _resizing.th.style.maxWidth = newW + 'px';
    });

    document.addEventListener('mouseup', function() {
        if (!_resizing) return;
        _resizing.handle.classList.remove('active');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        _resizing = null;
    });

    function initResizable() {
        document.querySelectorAll('.resize-handle').forEach(function(handle) {
            handle.addEventListener('mousedown', function(e) {
                e.preventDefault();
                e.stopPropagation();
                const th = handle.parentElement;
                _resizing = {
                    handle: handle,
                    th: th,
                    startX: e.clientX,
                    startW: th.offsetWidth
                };
                handle.classList.add('active');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
            });
        });
    }

    function setStatus(msg, color) {
        const el = document.getElementById('upload-status');
        el.textContent = msg;
        el.style.color = color;
    }

    // --- Table height slider ---
    document.addEventListener('DOMContentLoaded', function() {
        const slider = document.getElementById('tableHeight');
        const label  = document.getElementById('tableHeightValue');
        slider.addEventListener('input', function() {
            const h = slider.value + 'px';
            label.textContent = h;
            sessionStorage.setItem('proj_table_height', slider.value);
            document.querySelectorAll('.data-table-scroll').forEach(el => el.style.maxHeight = h);
        });

        // Draw button → save config to sessionStorage and go to Chart tab
        document.getElementById('chart-draw-btn').addEventListener('click', function() {
            const chartType = document.getElementById('chart-type-select').value;
            const xCol = document.getElementById('chart-x-select').value;
            const yCol = document.getElementById('chart-y-select').value;
            const zCol      = document.getElementById('chart-z-select').value;
            const labelCol  = document.getElementById('chart-label-select').value;
            const labelCol2 = document.getElementById('chart-label2-select').value;
            const labelCol3 = document.getElementById('chart-label3-select').value;
            sessionStorage.setItem('proj_chart_category', document.getElementById('chart-category-select').value);
            sessionStorage.setItem('proj_chart_type', chartType);
            sessionStorage.setItem('proj_chart_x', xCol);
            sessionStorage.setItem('proj_chart_y', yCol);
            sessionStorage.setItem('proj_chart_z', zCol);
            sessionStorage.setItem('proj_chart_label',   labelCol);
            sessionStorage.setItem('proj_chart_label_2', labelCol2);
            sessionStorage.setItem('proj_chart_label_3', labelCol3);
            sessionStorage.setItem('proj_chart_rows', JSON.stringify(_currentRows));
            window.location.href = '/project/chart/';
        });

        // Chart type definitions
        const _chartTypes = {
            basic: [
                { value: 'scatter',   label: 'Scatter'   },
                { value: 'line',      label: 'Line'       },
                { value: 'bar',       label: 'Bar'        },
                { value: 'histogram', label: 'Histogram'  },
            ],
            '3d': [
                { value: 'scatter3d', label: 'Scatter 3D' },
                { value: 'line3d',    label: 'Line 3D'    },
            ],
        };

        // Show/hide axis selectors based on 2D vs 3D
        function _showAxes(is3D) {
            const show = ['chart-x-label','chart-x-select','chart-y-label','chart-y-select'];
            if (is3D) show.push('chart-z-label','chart-z-select');
            show.push('chart-label-label','chart-label-select','chart-label2-label','chart-label2-select','chart-label3-label','chart-label3-select','chart-draw-btn');
            const all  = ['chart-x-label','chart-x-select','chart-y-label','chart-y-select','chart-z-label','chart-z-select','chart-label-label','chart-label-select','chart-label2-label','chart-label2-select','chart-label3-label','chart-label3-select','chart-draw-btn'];
            all.forEach(id => document.getElementById(id).style.display = show.includes(id) ? '' : 'none');
        }

        // Populate axis dropdowns and restore saved values
        function _populateAxes(is3D) {
            const colOptions     = _currentColumns.map(c => `<option value="${c}">${c}</option>`).join('');
            const colOptionsNone = '<option value="">(none)</option>' + colOptions;
            document.getElementById('chart-x-select').innerHTML = colOptions;
            document.getElementById('chart-y-select').innerHTML = colOptions;
            document.getElementById('chart-z-select').innerHTML = colOptions;
            ['chart-label-select','chart-label2-select','chart-label3-select'].forEach(id => {
                document.getElementById(id).innerHTML = colOptionsNone;
            });
            const sv = k => sessionStorage.getItem(k);
            if (sv('proj_chart_x'))    document.getElementById('chart-x-select').value = sv('proj_chart_x');
            if (sv('proj_chart_y'))    document.getElementById('chart-y-select').value = sv('proj_chart_y');
            if (sv('proj_chart_z'))    document.getElementById('chart-z-select').value = sv('proj_chart_z');
            if (sv('proj_chart_label')   !== null) document.getElementById('chart-label-select').value  = sv('proj_chart_label');
            if (sv('proj_chart_label_2') !== null) document.getElementById('chart-label2-select').value = sv('proj_chart_label_2');
            if (sv('proj_chart_label_3') !== null) document.getElementById('chart-label3-select').value = sv('proj_chart_label_3');
            _showAxes(is3D);
            sessionStorage.setItem('proj_chart_axis_open', '1');
        }

        // Restore full chart options bar from sessionStorage
        function restoreChartOptions() {
            const savedCat  = sessionStorage.getItem('proj_chart_category');
            const savedType = sessionStorage.getItem('proj_chart_type');
            if (savedCat) {
                document.getElementById('chart-category-select').value = savedCat;
                const types = _chartTypes[savedCat] || [];
                document.getElementById('chart-type-select').innerHTML = types.map(t => `<option value="${t.value}">${t.label}</option>`).join('');
                document.getElementById('chart-type-label').style.display = '';
                document.getElementById('chart-type-select').style.display = '';
                if (savedType) document.getElementById('chart-type-select').value = savedType;
            }
            if (sessionStorage.getItem('proj_chart_axis_open')) {
                _populateAxes(savedCat === '3d');
            }
        }

        // Stage 1: Category → populate type list
        document.getElementById('chart-category-select').addEventListener('change', function() {
            const cat = this.value;
            sessionStorage.setItem('proj_chart_category', cat);
            sessionStorage.removeItem('proj_chart_type');
            sessionStorage.removeItem('proj_chart_axis_open');
            const types = _chartTypes[cat] || [];
            document.getElementById('chart-type-select').innerHTML = types.map(t => `<option value="${t.value}">${t.label}</option>`).join('');
            document.getElementById('chart-type-label').style.display = cat ? '' : 'none';
            document.getElementById('chart-type-select').style.display = cat ? '' : 'none';
            // Hide all axis selectors until type is chosen
            ['chart-x-label','chart-x-select','chart-y-label','chart-y-select','chart-z-label','chart-z-select','chart-label-label','chart-label-select','chart-label2-label','chart-label2-select','chart-label3-label','chart-label3-select','chart-draw-btn'].forEach(id => {
                document.getElementById(id).style.display = 'none';
            });
        });

        // Stage 2: Type → show axis selectors
        document.getElementById('chart-type-select').addEventListener('change', function() {
            sessionStorage.setItem('proj_chart_type', this.value);
            const is3D = sessionStorage.getItem('proj_chart_category') === '3d';
            _populateAxes(is3D);
        });

        // Axis value saves
        document.getElementById('chart-x-select').addEventListener('change', function() { sessionStorage.setItem('proj_chart_x', this.value); });
        document.getElementById('chart-y-select').addEventListener('change', function() { sessionStorage.setItem('proj_chart_y', this.value); });
        document.getElementById('chart-z-select').addEventListener('change', function() { sessionStorage.setItem('proj_chart_z', this.value); });
        document.getElementById('chart-label-select').addEventListener('change',  function() { sessionStorage.setItem('proj_chart_label',   this.value); });
        document.getElementById('chart-label2-select').addEventListener('change', function() { sessionStorage.setItem('proj_chart_label_2', this.value); });
        document.getElementById('chart-label3-select').addEventListener('change', function() { sessionStorage.setItem('proj_chart_label_3', this.value); });

        // Filter bar event delegation
        const condArea = document.getElementById('select-conditions');
        condArea.addEventListener('input', function(e) {
            if (e.target.classList.contains('filter-val')) {
                _filterConditions[e.target.dataset.col].value = e.target.value;
                applyFilters();
            }
        });
        condArea.addEventListener('change', function(e) {
            if (e.target.classList.contains('filter-op')) {
                _filterConditions[e.target.dataset.col].op = e.target.value;
                applyFilters();
            }
        });
        condArea.addEventListener('click', function(e) {
            if (e.target.id === 'draw-chart-btn') {
                const opt = document.getElementById('chart-options');
                if (opt.style.display === 'none') {
                    opt.style.display = 'flex';
                    sessionStorage.setItem('proj_chart_open', '1');
                    restoreChartOptions();
                } else {
                    opt.style.display = 'none';
                    sessionStorage.removeItem('proj_chart_open');
                }
                return;
            }
            const col = e.target.dataset.col;
            if (e.target.classList.contains('filter-toggle')) {
                const cond = _filterConditions[col];
                cond.active = !cond.active;
                e.target.textContent = cond.active ? 'ON' : 'OFF';
                e.target.className = 'filter-toggle ' + (cond.active ? 'on' : 'off');
                applyFilters();
            }
            if (e.target.classList.contains('filter-remove')) {
                delete _filterConditions[col];
                // Remove col-filter highlight from tag
                const idx = _currentColumns.indexOf(col);
                if (idx >= 0) {
                    const tag = document.querySelector(`#columns-list .col-tag[data-col="${idx}"]`);
                    if (tag) tag.classList.remove('col-filter');
                }
                renderFilterConditions();
                applyFilters();
            }
        });

        // Restore saved slider value
        const savedHeight = sessionStorage.getItem('proj_table_height');
        if (savedHeight) {
            slider.value = savedHeight;
            label.textContent = savedHeight + 'px';
            document.querySelectorAll('.data-table-scroll').forEach(el => el.style.maxHeight = savedHeight + 'px');
        }

        // Restore uploaded file data if available
        const savedFilename = sessionStorage.getItem('proj_filename');
        const savedFiletype = sessionStorage.getItem('proj_filetype');
        const savedCols     = sessionStorage.getItem('proj_columns');
        const savedRows     = sessionStorage.getItem('proj_rows');
        if (savedFilename && savedCols) {
            const columns = JSON.parse(savedCols);
            const rows    = JSON.parse(savedRows || '[]');
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('info-filename').textContent = savedFilename;
            document.getElementById('info-filetype').textContent = savedFiletype || '';
            document.getElementById('sheet-row').style.display = 'none';
            showColumns(columns, rows);

            // Restore filter conditions
            const savedFilters = sessionStorage.getItem('proj_filter_conditions');
            if (savedFilters) {
                _filterConditions = JSON.parse(savedFilters);
                // Re-apply col-filter highlight on tags
                Object.keys(_filterConditions).forEach(function(col) {
                    const idx = columns.indexOf(col);
                    if (idx >= 0) {
                        const tag = document.querySelector(`#columns-list .col-tag[data-col="${idx}"]`);
                        if (tag) tag.classList.add('col-filter');
                    }
                });
                renderFilterConditions();
                applyFilters();
            }

            // Restore chart options bar
            if (sessionStorage.getItem('proj_chart_open')) {
                document.getElementById('chart-options').style.display = 'flex';
                restoreChartOptions();
            }
        }
    });
</script>

{% endblock %}
