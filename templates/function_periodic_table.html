{% extends "base.html" %}

{% block content %}
<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }
    main.tab_00 {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-height: 0;
    }
    #periodic-frame {
        flex: 1;
        width: 100%;
        border: none;
        min-height: 0;
    }
</style>

<header class="tab_00">
    <div style="display: flex;">
        <form action="/action/periodic_table/" method="get">
            <button type="submit" style="background-color: #444; color: {{ '#0f0' if function_sub_tab_active == 'periodic_table' else '#aaa' }};">Periodic Table</button>
        </form>
        <form action="/action/map/" method="get">
            <button type="submit" style="background-color: #444; color: {{ '#0f0' if function_sub_tab_active == 'map' else '#aaa' }};">World Map</button>
        </form>
    </div>
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 5px;">
        <div class="title_00" style="margin: 0;">Function — Periodic Table</div>
    </div>
</header>

<main class="tab_00">
    <iframe id="periodic-frame" src="/table/"></iframe>
</main>
{% endblock %}
