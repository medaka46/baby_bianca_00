{% extends "base.html" %}

{% block content %}
<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }
    main.tab_00 {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-height: 0;
    }
    #chart-container {
        flex: 1;
        min-height: 0;
        padding: 8px 12px;
        display: flex;
        flex-direction: column;
    }
    #chart-div {
        flex: 1;
        min-height: 0;
    }
    #no-data-msg {
        color: #666;
        font-size: 13px;
        text-align: center;
        margin-top: 40px;
    }
</style>

<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

<header class="tab_00">
    <div style="display: flex;">
        <form action="/project/" method="get">
            <button type="submit" style="background-color: #444; color: {{ '#0f0' if project_sub_tab_active == 'sort_select' else '#aaa' }};">Sort/Select</button>
        </form>
        <form action="/project/edit/" method="get">
            <button type="submit" style="background-color: #444; color: {{ '#0f0' if project_sub_tab_active == 'edit' else '#aaa' }};">Edit</button>
        </form>
        <form action="/project/chart/" method="get">
            <button type="submit" style="background-color: #444; color: {{ '#0f0' if project_sub_tab_active == 'chart' else '#aaa' }};">Chart</button>
        </form>
    </div>
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 5px;">
        <div class="title_00" style="margin: 0;">Project — Chart</div>
        <div id="chart-info" style="font-size: 11px; color: #888;"></div>
    </div>
</header>

<main class="tab_00">
    <div id="chart-container">
        <div id="no-data-msg">No chart data. Go to Sort/Select tab and click Draw.</div>
        <div id="chart-div"></div>
    </div>
</main>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const chartType = sessionStorage.getItem('proj_chart_type');
    const xCol     = sessionStorage.getItem('proj_chart_x');
    const yCol     = sessionStorage.getItem('proj_chart_y');
    const zCol     = sessionStorage.getItem('proj_chart_z') || '';
    const colorCol = sessionStorage.getItem('proj_chart_color') || '';
    const labelCols = [
        sessionStorage.getItem('proj_chart_label')   || '',
        sessionStorage.getItem('proj_chart_label_2') || '',
        sessionStorage.getItem('proj_chart_label_3') || '',
    ].filter(c => c !== '');
    const rowsJson = sessionStorage.getItem('proj_chart_rows');
    if (!chartType || !rowsJson) return;

    const rows = JSON.parse(rowsJson);
    if (!rows.length) return;

    document.getElementById('no-data-msg').style.display = 'none';
    document.getElementById('chart-info').textContent =
        chartType.toUpperCase() + '  |  X: ' + xCol + (yCol ? '  |  Y: ' + yCol : '') +
        (colorCol ? '  |  Color: ' + colorCol : '') +
        (labelCols.length ? '  |  Label: ' + labelCols.join(', ') : '') + '  |  ' + rows.length + ' rows';

    const xVals   = rows.map(r => r[xCol] ?? null);
    const yVals   = rows.map(r => r[yCol] ?? null);
    const zVals   = zCol ? rows.map(r => r[zCol] ?? null) : null;
    const lblVals = labelCols.length
        ? rows.map(r => labelCols.map(c => String(r[c] ?? '')).join(' | '))
        : null;

    // --- Color logic ---
    const PALETTE = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#e91e63','#00bcd4','#8bc34a','#ff5722','#607d8b'];
    let colorVals = null, isNumericColor = false, catColorMap = null, uniqueCats = null;
    if (colorCol) {
        const raw = rows.map(r => r[colorCol] ?? null);
        const numParsed = raw.map(v => parseFloat(v));
        isNumericColor = numParsed.every(v => !isNaN(v));
        if (isNumericColor) {
            colorVals = numParsed;
        } else {
            colorVals = raw;
            uniqueCats = [...new Set(raw.filter(v => v !== null).map(String))];
            catColorMap = Object.fromEntries(uniqueCats.map((v, i) => [v, PALETTE[i % PALETTE.length]]));
        }
    }

    function catColors() {
        return colorVals.map(v => v !== null ? (catColorMap[String(v)] || '#888') : '#888');
    }
    function numericMarkerExtra(title) {
        return { colorscale: 'Viridis', showscale: true,
            colorbar: { title: title, thickness: 12, len: 0.7,
                tickfont: { color: '#aaa', size: 10 }, titlefont: { color: '#aaa', size: 10 } } };
    }

    const is3D = (chartType === 'scatter3d' || chartType === 'line3d');

    function hoverTpl2d(xName, yName) {
        const lbl = lblVals ? '<b>%{text}</b><br>' : '';
        return lbl + xName + ': %{x}<br>' + yName + ': %{y}<extra></extra>';
    }
    function hoverTpl3d(xName, yName, zName) {
        const lbl = lblVals ? '<b>%{text}</b><br>' : '';
        return lbl + xName + ': %{x}<br>' + yName + ': %{y}<br>' + zName + ': %{z}<extra></extra>';
    }

    const layout = {
        paper_bgcolor: '#1a1a1a',
        plot_bgcolor:  '#1a1a1a',
        font:  { color: '#ccc', size: 11 },
        margin: { t: 30, r: 20, b: 50, l: 60 },
        autosize: true,
    };
    if (is3D) {
        layout.scene = {
            xaxis: { title: xCol, gridcolor: '#444', color: '#aaa' },
            yaxis: { title: yCol, gridcolor: '#444', color: '#aaa' },
            zaxis: { title: zCol, gridcolor: '#444', color: '#aaa' },
            bgcolor: '#1a1a1a',
        };
    } else {
        layout.xaxis = { title: xCol, gridcolor: '#333', zerolinecolor: '#555', color: '#aaa' };
        layout.yaxis = { title: yCol, gridcolor: '#333', zerolinecolor: '#555', color: '#aaa' };
    }

    // Show legend for categorical color on scatter/scatter3d
    if (colorCol && !isNumericColor && (chartType === 'scatter' || chartType === 'scatter3d')) {
        layout.legend = { font: { color: '#ccc', size: 10 }, bgcolor: '#222', bordercolor: '#444', borderwidth: 1 };
        layout.showlegend = true;
        layout.margin.r = 120;
    }

    const config = {
        responsive: true,
        displayModeBar: true,
        modeBarButtonsToRemove: ['toImage'],
        displaylogo: false,
    };

    // Helper: build categorical multi-traces for scatter
    function catScatter2D() {
        return uniqueCats.map((cat, ci) => {
            const mask = rows.reduce((acc, r, idx) => { if (String(r[colorCol] ?? '') === cat) acc.push(idx); return acc; }, []);
            return { x: mask.map(i => xVals[i]), y: mask.map(i => yVals[i]),
                mode: 'markers', type: 'scatter', name: String(cat),
                text: lblVals ? mask.map(i => lblVals[i]) : undefined,
                hovertemplate: hoverTpl2d(xCol, yCol),
                marker: { color: PALETTE[ci % PALETTE.length], size: 5, opacity: 0.8 } };
        });
    }
    function catScatter3D() {
        return uniqueCats.map((cat, ci) => {
            const mask = rows.reduce((acc, r, idx) => { if (String(r[colorCol] ?? '') === cat) acc.push(idx); return acc; }, []);
            return { x: mask.map(i => xVals[i]), y: mask.map(i => yVals[i]), z: mask.map(i => zVals[i]),
                mode: 'markers', type: 'scatter3d', name: String(cat),
                text: lblVals ? mask.map(i => lblVals[i]) : undefined,
                hovertemplate: hoverTpl3d(xCol, yCol, zCol),
                marker: { color: PALETTE[ci % PALETTE.length], size: 4, opacity: 0.8 } };
        });
    }

    let traces;
    if (chartType === 'scatter') {
        if (colorCol && !isNumericColor) {
            traces = catScatter2D();
        } else {
            const mColor = isNumericColor
                ? { color: colorVals, size: 5, opacity: 0.8, ...numericMarkerExtra(colorCol) }
                : { color: '#0f0', size: 5, opacity: 0.8 };
            traces = [{ x: xVals, y: yVals, mode: 'markers', type: 'scatter',
                text: lblVals || undefined, hovertemplate: hoverTpl2d(xCol, yCol), marker: mColor }];
        }
    } else if (chartType === 'line') {
        const mColor = colorVals
            ? (isNumericColor
                ? { color: colorVals, size: 4, ...numericMarkerExtra(colorCol) }
                : { color: catColors(), size: 4 })
            : { color: '#0f0', size: 4 };
        traces = [{ x: xVals, y: yVals, mode: 'lines+markers', type: 'scatter',
            text: lblVals || undefined, hovertemplate: hoverTpl2d(xCol, yCol),
            line: { color: '#0f0', width: 1.5 }, marker: mColor }];
    } else if (chartType === 'bar') {
        const mColor = colorVals
            ? (isNumericColor
                ? { color: colorVals, ...numericMarkerExtra(colorCol) }
                : { color: catColors() })
            : { color: '#0a6' };
        traces = [{ x: xVals, y: yVals, type: 'bar',
            text: lblVals || undefined, hovertemplate: hoverTpl2d(xCol, yCol), marker: mColor }];
        layout.xaxis.type = 'category';
    } else if (chartType === 'histogram') {
        traces = [{ x: xVals, type: 'histogram', marker: { color: '#06a' }, autobinx: true }];
        layout.yaxis = { title: 'Count', gridcolor: '#333', zerolinecolor: '#555', color: '#aaa' };
    } else if (chartType === 'scatter3d') {
        if (colorCol && !isNumericColor) {
            traces = catScatter3D();
        } else {
            const mColor = isNumericColor
                ? { color: colorVals, size: 4, opacity: 0.8, ...numericMarkerExtra(colorCol) }
                : { color: '#0f0', size: 4, opacity: 0.8 };
            traces = [{ x: xVals, y: yVals, z: zVals, mode: 'markers', type: 'scatter3d',
                text: lblVals || undefined, hovertemplate: hoverTpl3d(xCol, yCol, zCol), marker: mColor }];
        }
    } else if (chartType === 'line3d') {
        const mColor = colorVals
            ? (isNumericColor
                ? { color: colorVals, size: 3, ...numericMarkerExtra(colorCol) }
                : { color: catColors(), size: 3 })
            : { color: '#0f0', size: 3 };
        traces = [{ x: xVals, y: yVals, z: zVals, mode: 'lines+markers', type: 'scatter3d',
            text: lblVals || undefined, hovertemplate: hoverTpl3d(xCol, yCol, zCol),
            line: { color: '#0f0', width: 2 }, marker: mColor }];
    }

    Plotly.newPlot('chart-div', traces, layout, config);
});
</script>
{% endblock %}
