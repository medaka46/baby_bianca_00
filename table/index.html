<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Periodic Table</title>
<style>
  :root {
    --alkali: #ff6b6b;
    --alkaline: #ffa94d;
    --transition: #74b9ff;
    --post-transition: #a29bfe;
    --metalloid: #55efc4;
    --nonmetal: #fdcb6e;
    --halogen: #fd79a8;
    --noble: #81ecec;
    --lanthanide: #dfe6e9;
    --actinide: #b2bec3;
    --unknown: #636e72;
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #16213e;
    --text: #e0e0e0;
    --text-dim: #a0a0b0;
    --accent: #7c83ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    padding: 12px;
  }

  .title-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 10px;
  }

  h1 {
    font-size: 1.8rem;
    font-weight: 700;
    background: linear-gradient(135deg, #7c83ff, #a29bfe, #81ecec);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
  }

  .lang-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap;
  }
  .lang-btn:hover { background: var(--accent); color: #fff; }

  /* Search */
  .search-bar {
    display: flex;
    justify-content: center;
    margin-bottom: 12px;
    gap: 8px;
  }
  .search-bar input {
    width: 280px;
    padding: 8px 14px;
    border-radius: 24px;
    border: 1.5px solid #444;
    background: var(--surface);
    color: var(--text);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar button {
    padding: 8px 14px;
    border-radius: 24px;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    font-size: 0.85rem;
    transition: opacity 0.2s;
  }
  .search-bar button:hover { opacity: 0.85; }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    margin-bottom: 14px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.72rem;
    color: var(--text-dim);
    cursor: pointer;
    padding: 3px 8px;
    border-radius: 12px;
    background: var(--surface2);
    border: 1px solid transparent;
    transition: border-color 0.2s;
  }
  .legend-item:hover { border-color: #555; }
  .legend-item.active { border-color: var(--accent); }
  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  /* Table wrapper */
  .table-wrapper {
    overflow-x: auto;
    padding-bottom: 6px;
  }

  /* Periodic Table Grid */
  .periodic-table {
    display: grid;
    grid-template-columns: repeat(18, minmax(54px, 1fr));
    grid-template-rows: repeat(10, auto);
    gap: 3px;
    min-width: 980px;
    max-width: 1300px;
    margin: 0 auto;
  }

  /* Element Cell */
  .element {
    position: relative;
    border-radius: 6px;
    padding: 4px 3px 3px;
    cursor: pointer;
    text-align: center;
    border: 1.5px solid rgba(255,255,255,0.08);
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    user-select: none;
    min-height: 58px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
  }
  .element:hover {
    transform: scale(1.18);
    z-index: 10;
    box-shadow: 0 6px 24px rgba(0,0,0,0.6);
    border-color: rgba(255,255,255,0.4);
  }
  .element.dimmed { opacity: 0.18; }
  .element.highlighted {
    outline: 2.5px solid #fff;
    outline-offset: 1px;
    opacity: 1 !important;
    transform: scale(1.1);
    z-index: 5;
    box-shadow: 0 0 16px rgba(255,255,255,0.3);
  }
  .element.selected {
    outline: 2.5px solid #fff;
    outline-offset: 2px;
    z-index: 6;
    box-shadow: 0 0 20px rgba(255,255,255,0.35);
  }

  .el-number {
    font-size: 0.58rem;
    color: rgba(0,0,0,0.65);
    font-weight: 600;
    line-height: 1;
    align-self: flex-start;
  }
  .el-symbol {
    font-size: 1.15rem;
    font-weight: 800;
    color: #000;
    line-height: 1.1;
    letter-spacing: -0.5px;
  }
  .el-name {
    font-size: 0.5rem;
    color: rgba(0,0,0,0.7);
    line-height: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .el-mass {
    font-size: 0.5rem;
    color: rgba(0,0,0,0.6);
    line-height: 1;
  }

  /* Category colors */
  .alkali        { background: var(--alkali); }
  .alkaline      { background: var(--alkaline); }
  .transition    { background: var(--transition); }
  .post-transition { background: var(--post-transition); }
  .metalloid     { background: var(--metalloid); }
  .nonmetal      { background: var(--nonmetal); }
  .halogen       { background: var(--halogen); }
  .noble         { background: var(--noble); }
  .lanthanide    { background: var(--lanthanide); }
  .actinide      { background: var(--actinide); }
  .unknown-elem  { background: var(--unknown); }
  .unknown-elem .el-number,
  .unknown-elem .el-symbol,
  .unknown-elem .el-name,
  .unknown-elem .el-mass { color: #ccc; }

  /* Period labels */
  .period-label {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    color: var(--text-dim);
    font-weight: 600;
  }

  /* Group labels row */
  .group-label {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    color: var(--text-dim);
    padding: 2px 0;
    font-weight: 600;
  }

  /* Placeholder cell */
  .empty { background: transparent; border-color: transparent; cursor: default; }
  .empty:hover { transform: none; box-shadow: none; }

  /* State badge */
  .state-badge {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 10px;
    font-size: 0.78rem;
    font-weight: 600;
  }
  .state-solid { background: #636e72; color: #fff; }
  .state-liquid { background: #0984e3; color: #fff; }
  .state-gas { background: #00b894; color: #fff; }
  .state-unknown { background: #444; color: #aaa; }

  /* Detail panel */
  .detail-panel {
    max-width: 1300px;
    margin: 18px auto 0;
    background: var(--surface);
    border: 1.5px solid #2a2a3e;
    border-radius: 14px;
    padding: 20px 28px;
    display: none;
    animation: panelIn 0.22s ease;
  }
  .detail-panel.visible { display: block; }
  @keyframes panelIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .detail-panel .dp-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 18px;
  }
  .dp-symbol-box {
    width: 80px; height: 80px;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .dp-symbol-box .dp-num {
    font-size: 0.78rem;
    font-weight: 700;
    color: rgba(0,0,0,0.55);
  }
  .dp-symbol-box .dp-sym {
    font-size: 2.2rem;
    font-weight: 900;
    color: #000;
    line-height: 1;
  }
  .dp-header-text h2 {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
    margin: 0;
  }
  .dp-header-text p {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-top: 3px;
  }
  .dp-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px 24px;
    margin-bottom: 16px;
  }
  @media (max-width: 760px) {
    .dp-grid { grid-template-columns: repeat(2, 1fr); }
  }
  .dp-field label {
    display: block;
    font-size: 0.67rem;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-dim);
    margin-bottom: 3px;
  }
  .dp-field span {
    font-size: 0.92rem;
    font-weight: 600;
    color: var(--text);
  }
  .dp-desc {
    font-size: 0.85rem;
    color: var(--text-dim);
    line-height: 1.65;
    border-top: 1px solid #2a2a3e;
    padding-top: 14px;
  }
</style>
</head>

// ── Derived maps ───────────────────────────────────────────────────────────
const elementMap = {};
ELEMENTS.forEach(e => {
  elementMap[e[0]] = {
    z: e[0], symbol: e[1], nameEN: e[2], nameJA: e[3], mass: e[4],
    category: e[5], col: e[6], row: e[7],
    config: e[8], discovery: e[9], state: e[10],
    descEN: e[11], descJA: e[12]
  };
});

function eName(e)  { return lang === 'ja' ? e.nameJA  : e.nameEN;  }
function eDesc(e)  { return lang === 'ja' ? e.descJA  : e.descEN;  }
function catLabel(key) { return CATEGORIES[key][lang] || CATEGORIES[key].en; }
function ui(key)   { return UI[lang][key]; }

// ── Lang toggle ────────────────────────────────────────────────────────────
function toggleLang() {
  lang = lang === 'en' ? 'ja' : 'en';
  applyLang();
}

function applyLang() {
  document.getElementById('pageTitle').textContent  = ui('title');
  document.getElementById('langBtn').textContent    = ui('langBtn');
  document.getElementById('searchInput').placeholder = ui('placeholder');
  document.getElementById('clearBtn').textContent   = ui('clear');
  document.getElementById('lblAtomicNum').textContent = ui('atomicNum');
  document.getElementById('lblMass').textContent    = ui('mass');
  document.getElementById('lblState').textContent   = ui('state');
  document.getElementById('lblDiscovery').textContent = ui('discovery');
  document.getElementById('lblConfig').textContent  = ui('config');

  // Update legend labels
  document.querySelectorAll('.legend-item[data-cat]').forEach(item => {
    const key = item.dataset.cat;
    item.querySelector('span').textContent = catLabel(key);
  });

  // Update element cell names
  document.querySelectorAll('.element[data-z]').forEach(cell => {
    const z = parseInt(cell.dataset.z);
    const e = elementMap[z];
    if (e) cell.querySelector('.el-name').textContent = eName(e);
  });

  // Re-render detail panel if visible
  if (document.getElementById('detailPanel').classList.contains('visible') && currentZ) {
    renderDetail(currentZ);
  }
}

// ── State badge ────────────────────────────────────────────────────────────
function stateBadge(state) {
  const cls = { Solid:'state-solid', Liquid:'state-liquid', Gas:'state-gas', Unknown:'state-unknown' }[state] || 'state-unknown';
  const label = UI[lang].states[state] || state;
  return `<span class="state-badge ${cls}">${label}</span>`;
}

// ── Legend ─────────────────────────────────────────────────────────────────
let activeFilter = null;

function buildLegend() {
  const legend = document.getElementById('legend');
  legend.innerHTML = '';
  Object.entries(CATEGORIES).forEach(([key, val]) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.dataset.cat = key;
    item.innerHTML = `<div class="legend-dot" style="background:${val.color}"></div><span>${catLabel(key)}</span>`;
    item.addEventListener('click', () => toggleCategoryFilter(key, item));
    legend.appendChild(item);
  });
}

function toggleCategoryFilter(cat, item) {
  if (activeFilter === cat) {
    activeFilter = null;
    document.querySelectorAll('.legend-item').forEach(i => i.classList.remove('active'));
    document.querySelectorAll('.element').forEach(el => el.classList.remove('dimmed','highlighted'));
  } else {
    activeFilter = cat;
    document.querySelectorAll('.legend-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    document.querySelectorAll('.element[data-z]').forEach(el => {
      const z = parseInt(el.dataset.z);
      const elem = elementMap[z];
      if (elem && elem.category === cat) {
        el.classList.remove('dimmed'); el.classList.add('highlighted');
      } else {
        el.classList.add('dimmed'); el.classList.remove('highlighted');
      }
    });
  }
  filterElements();
}

// ── Table ──────────────────────────────────────────────────────────────────
function getCategoryClass(cat) {
  const map = {
    'alkali':'alkali','alkaline':'alkaline','transition':'transition',
    'post-transition':'post-transition','metalloid':'metalloid','nonmetal':'nonmetal',
    'halogen':'halogen','noble':'noble','lanthanide':'lanthanide','actinide':'actinide',
    'unknown':'unknown-elem'
  };
  return map[cat] || 'unknown-elem';
}

function buildTable() {
  const table = document.getElementById('periodicTable');

  for (let g = 1; g <= 18; g++) {
    const lbl = document.createElement('div');
    lbl.className = 'group-label';
    lbl.style.gridColumn = g;
    lbl.style.gridRow = 1;
    lbl.textContent = g;
    table.appendChild(lbl);
  }

  for (let p = 1; p <= 7; p++) {
    const lbl = document.createElement('div');
    lbl.className = 'period-label';
    lbl.style.gridColumn = 1;
    lbl.style.gridRow = p + 1;
    lbl.textContent = p;
    table.appendChild(lbl);
  }

  ELEMENTS.forEach(e => {
    const elem = elementMap[e[0]];
    const cell = document.createElement('div');
    cell.className = `element ${getCategoryClass(elem.category)}`;
    cell.dataset.z = elem.z;
    cell.dataset.nameen = elem.nameEN.toLowerCase();
    cell.dataset.nameja = elem.nameJA;
    cell.dataset.symbol = elem.symbol.toLowerCase();
    cell.dataset.category = elem.category;
    cell.style.gridColumn = elem.col;
    cell.style.gridRow = elem.row;
    cell.innerHTML = `
      <span class="el-number">${elem.z}</span>
      <span class="el-symbol">${elem.symbol}</span>
      <span class="el-name">${eName(elem)}</span>
      <span class="el-mass">${elem.mass}</span>
    `;
    cell.addEventListener('click', () => openDetail(elem.z));
    table.appendChild(cell);
  });

  // Placeholders
  const laP = document.createElement('div');
  laP.className = 'element lanthanide';
  laP.style.cssText = 'grid-column:3;grid-row:7;opacity:0.5;cursor:default';
  laP.innerHTML = `<span class="el-number" style="font-size:.55rem">57-71</span><span class="el-symbol" style="font-size:.75rem">La-Lu</span>`;
  table.appendChild(laP);

  const acP = document.createElement('div');
  acP.className = 'element actinide';
  acP.style.cssText = 'grid-column:3;grid-row:8;opacity:0.5;cursor:default';
  acP.innerHTML = `<span class="el-number" style="font-size:.55rem">89-103</span><span class="el-symbol" style="font-size:.75rem">Ac-Lr</span>`;
  table.appendChild(acP);

  // Series labels
  [['Lanthanides', 9], ['Actinides', 10]].forEach(([key, row]) => {
    const lbl = document.createElement('div');
    lbl.dataset.serieskey = key.toLowerCase();
    lbl.style.cssText = `grid-column:1/span 3;grid-row:${row};display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:0.6rem;color:var(--text-dim);font-weight:600`;
    lbl.textContent = ui(key.toLowerCase());
    table.appendChild(lbl);
  });
}

// ── Detail panel ───────────────────────────────────────────────────────────
let currentZ = null;
let selectedCell = null;

function openDetail(z) {
  currentZ = z;
  if (selectedCell) selectedCell.classList.remove('selected');
  selectedCell = document.querySelector(`.element[data-z="${z}"]`);
  if (selectedCell) selectedCell.classList.add('selected');
  renderDetail(z);
  const panel = document.getElementById('detailPanel');
  panel.classList.add('visible');
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderDetail(z) {
  const e = elementMap[z];
  if (!e) return;
  const catInfo = CATEGORIES[e.category] || CATEGORIES['unknown'];
  document.getElementById('dpSymBox').style.background = catInfo.color;
  document.getElementById('dpNum').textContent  = e.z;
  document.getElementById('dpSym').textContent  = e.symbol;
  document.getElementById('dpName').textContent = eName(e);
  document.getElementById('dpCategory').textContent = catLabel(e.category);
  document.getElementById('dpAtomicNum').textContent = e.z;
  document.getElementById('dpMass').textContent = e.mass + ' u';
  document.getElementById('dpConfig').textContent = e.config;
  document.getElementById('dpDiscovery').textContent = e.discovery || ui('ancient');
  document.getElementById('dpState').innerHTML = stateBadge(e.state);
  document.getElementById('dpDesc').textContent = eDesc(e);
}

// ── Search ─────────────────────────────────────────────────────────────────
function filterElements() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const cells = document.querySelectorAll('.element[data-z]');
  if (!query) {
    if (activeFilter) {
      cells.forEach(el => {
        const z = parseInt(el.dataset.z);
        const elem = elementMap[z];
        if (elem && elem.category === activeFilter) {
          el.classList.remove('dimmed'); el.classList.add('highlighted');
        } else {
          el.classList.add('dimmed'); el.classList.remove('highlighted');
        }
      });
    } else {
      cells.forEach(el => el.classList.remove('dimmed','highlighted'));
    }
    return;
  }
  cells.forEach(el => {
    const nameEN = el.dataset.nameen || '';
    const nameJA = el.dataset.nameja || '';
    const sym    = el.dataset.symbol || '';
    const matches = nameEN.includes(query) || sym.includes(query) || nameJA.includes(query);
    if (matches) {
      el.classList.remove('dimmed'); el.classList.add('highlighted');
    } else {
      el.classList.add('dimmed'); el.classList.remove('highlighted');
    }
  });
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  activeFilter = null;
  document.querySelectorAll('.legend-item').forEach(i => i.classList.remove('active'));
  document.querySelectorAll('.element[data-z]').forEach(el => el.classList.remove('dimmed','highlighted'));
}

// ── Init ───────────────────────────────────────────────────────────────────
buildLegend();
buildTable();
</script>

</html>
