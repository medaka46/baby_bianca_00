services:
  - type: web
    name: baby-bianca-app
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m scripts.migrate_daily_tasks && python -m scripts.migrate_repeat_tasks && python -m scripts.migrate_tab_restriction && uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: RENDER
        value: "true"
      - key: TRANSLATOR_ENGINE
        value: "claude"
      # ANTHROPIC_API_KEY is intentionally NOT listed here.
      # It must be added as a SECRET env var in the Render dashboard
      # (Settings → Environment → Add Environment Variable) so it never
      # lands in git. The translator dispatcher reads it via os.getenv at
      # first translation; if missing, the job's error_message will say so.
    disk:
      name: baby-bianca-data
      mountPath: /var/data
      sizeGB: 2
