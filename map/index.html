<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive World Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root {
    --africa:    #ff6b6b;
    --asia:      #74b9ff;
    --europe:    #a29bfe;
    --namerica:  #fdcb6e;
    --samerica:  #55efc4;
    --oceania:   #fd79a8;
    --antarctica:#b2bec3;
    --unknown:   #636e72;
    --bg:        #0f0f1a;
    --surface:   #1a1a2e;
    --surface2:  #16213e;
    --text:      #e0e0e0;
    --text-dim:  #a0a0b0;
    --accent:    #7c83ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    padding: 3px 12px;
    overflow-x: hidden;
  }

  .title-row {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    margin-bottom: 5px;
    position: relative;
  }
  .title-center {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  h1 {
    font-size: 1.8rem;
    font-weight: 700;
    background: linear-gradient(135deg, #7c83ff, #a29bfe, #81ecec);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
  }

  .lang-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap;
  }
  .lang-btn:hover { background: var(--accent); color: #fff; }

  .search-bar {
    display: flex;
    justify-content: flex-start;
    margin-bottom: 5px;
    gap: 8px;
  }
  .search-bar input {
    width: 100%;
    padding: 8px 14px;
    border-radius: 24px;
    border: 1.5px solid #444;
    background: var(--surface);
    color: var(--text);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar button {
    padding: 8px 14px;
    border-radius: 24px;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    font-size: 0.85rem;
    transition: opacity 0.2s;
  }
  .search-bar button:hover { opacity: 0.85; }

  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-start;
    gap: 6px;
    margin-bottom: 5px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.72rem;
    color: var(--text-dim);
    cursor: pointer;
    padding: 3px 8px;
    border-radius: 12px;
    background: var(--surface2);
    border: 1px solid transparent;
    transition: border-color 0.2s;
    user-select: none;
  }
  .legend-item:hover { border-color: #555; }
  .legend-item.active { border-color: var(--accent); }
  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .zoom-controls {
    display: flex;
    justify-content: flex-start;
    gap: 6px;
    margin-bottom: 8px;
  }
  .zoom-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1.5px solid #444;
    background: var(--surface);
    color: var(--text);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, background 0.2s;
    line-height: 1;
  }
  .zoom-btn:hover { border-color: var(--accent); background: var(--surface2); }

  .map-wrapper {
    position: relative;
    width: 100%;
    background: var(--surface2);
    border-radius: 12px;
    overflow: hidden;
    border: 1.5px solid #2a2a3e;
    cursor: grab;
  }
  .map-wrapper:active { cursor: grabbing; }

  #map-svg {
    width: 100%;
    display: block;
  }

  .country-path {
    stroke: #1a1a2e;
    stroke-width: 0.4px;
    transition: opacity 0.2s;
  }
  .country-path.dimmed { opacity: 0.15; }
  .country-path.highlighted { stroke: rgba(255,255,255,0.7); stroke-width: 1.2px; }
  .country-path.selected   { stroke: #fff; stroke-width: 1.5px; filter: brightness(1.25); }

  .graticule { fill: none; stroke: #2a2a3e; stroke-width: 0.3px; }
  .sphere     { fill: #0d1117; }

  /* Tooltip */
  #tooltip {
    position: fixed;
    background: var(--surface);
    border: 1px solid #3a3a5e;
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 0.82rem;
    color: var(--text);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 100;
    white-space: nowrap;
  }
  #tooltip.visible { opacity: 1; }

  /* Side-by-side layout */
  .content-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .map-wrapper {
    flex: 1;
    min-width: 0;
  }

  /* Detail panel */
  .detail-panel {
    width: 260px;
    flex-shrink: 0;
    background: var(--surface);
    border: 1.5px solid #2a2a3e;
    border-radius: 14px;
    padding: 16px;
  }
  .dp-placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 160px;
    color: var(--text-dim);
    font-size: 0.82rem;
    text-align: center;
    line-height: 1.5;
  }
  .dp-content { display: none; animation: panelIn 0.22s ease; }
  .detail-panel.visible .dp-content { display: block; }
  .detail-panel.visible .dp-placeholder { display: none; }
  @keyframes panelIn {
    from { opacity: 0; transform: translateX(8px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .dp-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .dp-flag {
    font-size: 3.2rem;
    line-height: 1;
    flex-shrink: 0;
  }
  .dp-color-box {
    width: 40px; height: 40px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
  }
  .dp-header-text h2 {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    margin: 0;
  }
  .dp-header-text p {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-top: 3px;
  }
  .dp-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px 12px;
    margin-bottom: 14px;
  }
  .dp-field label {
    display: block;
    font-size: 0.67rem;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-dim);
    margin-bottom: 3px;
  }
  .dp-field span {
    font-size: 0.92rem;
    font-weight: 600;
    color: var(--text);
  }
  .dp-desc {
    font-size: 0.85rem;
    color: var(--text-dim);
    line-height: 1.65;
    border-top: 1px solid #2a2a3e;
    padding-top: 14px;
  }

  .dp-tabs { display: flex; gap: 4px; margin: 8px 0 6px; }
  .dp-tab {
    padding: 3px 10px;
    border-radius: 10px;
    border: 1.5px solid #444;
    background: transparent;
    color: var(--text-dim);
    font-size: 0.75rem;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .dp-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(124,131,255,0.15); }
  #dtHolidays, #dtClimate { max-height: 740px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #666 #333; }
  #dtHolidays::-webkit-scrollbar, #dtClimate::-webkit-scrollbar { width: 6px; }
  #dtHolidays::-webkit-scrollbar-thumb, #dtClimate::-webkit-scrollbar-thumb { background: #666; border-radius: 3px; }
  .dp-table { width: 100%; border-collapse: collapse; font-size: 0.76rem; margin-top: 2px; }
  .dp-table th { color: var(--text-dim); font-weight: 600; padding: 3px 4px; border-bottom: 1px solid #2a2a3e; text-align: left; white-space: nowrap; }
  .dp-table td { padding: 3px 4px; border-bottom: 1px solid #1a1a2e; }
  .dp-loading { color: var(--text-dim); font-size: 0.82rem; padding: 10px 0; }
  .dp-unavail { color: var(--text-dim); font-size: 0.82rem; padding: 10px 0; font-style: italic; }
  .dp-climate-city { font-size: 0.78rem; color: var(--accent); margin-bottom: 4px; }

  /* Country map overlay */
  #countryMapOverlay {
    position: absolute;
    top: 20px; left: 20px; right: 20px; bottom: 20px;
    z-index: 10;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    display: none;
  }
  #countryMapLeaflet { width: 100%; height: 100%; }
  #countryMapClose {
    position: absolute;
    top: 8px; right: 8px;
    z-index: 1000;
    background: rgba(0,0,0,0.65);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 28px; height: 28px;
    font-size: 15px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }
  #countryMapClose:hover { background: rgba(200,0,0,0.8); }
  #dpName.map-available { cursor: pointer; text-decoration: underline dotted; }

  .proj-toggle {
    display: flex;
    gap: 4px;
    margin-left: auto;
    margin-right: 10px;
  }
  .proj-btn {
    padding: 4px 10px;
    border-radius: 12px;
    border: 1.5px solid #555;
    background: transparent;
    color: var(--text-dim);
    font-size: 0.75rem;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .proj-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,131,255,0.15);
  }

  .zoom-slider-wrap {
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .zoom-slider-wrap label {
    font-size: 0.75rem;
    color: var(--text-dim);
    white-space: nowrap;
  }
  #zoomSlider {
    -webkit-appearance: none;
    appearance: none;
    width: 120px;
    height: 4px;
    border-radius: 2px;
    background: #444;
    outline: none;
    cursor: pointer;
  }
  #zoomSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="title-row">
  <div class="title-center">
    <h1 id="pageTitle">Interactive World Map</h1>
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">日本語</button>
  </div>
  <div class="proj-toggle">
    <button id="btnFlat"  class="proj-btn active" onclick="switchProjection('flat')">Flat</button>
    <button id="btnGlobe" class="proj-btn"        onclick="switchProjection('globe')">Globe</button>
  </div>
  <div class="zoom-slider-wrap">
    <label for="zoomSlider">🔍</label>
    <input type="range" id="zoomSlider" min="50" max="600" value="90" oninput="applyZoom(this.value)">
  </div>
</div>

<div class="content-row">
  <div class="map-wrapper" id="mapWrapper">
    <svg id="map-svg" viewBox="0 0 500 500"></svg>
    <div id="countryMapOverlay">
      <button id="countryMapClose" onclick="closeCountryMap()">✕</button>
      <div id="countryMapLeaflet"></div>
    </div>
  </div>

  <div class="detail-panel" id="detailPanel">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search country name..." oninput="filterCountries()">
      <button onclick="clearSearch()" id="clearBtn">Clear</button>
    </div>
    <div class="legend" id="legend"></div>
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="rotateBy(-30)" title="Rotate Left">◀</button>
      <button class="zoom-btn" onclick="rotateBy(30)"  title="Rotate Right">▶</button>
      <button class="zoom-btn" onclick="resetRotation()" title="Reset" style="width:auto;padding:0 10px;font-size:0.75rem;">Reset</button>
    </div>
    <div class="dp-placeholder" id="dpPlaceholder">Click a country to see details</div>
    <div class="dp-content">
      <div class="dp-header">
        <div class="dp-color-box" id="dpColorBox"></div>
        <div class="dp-header-text">
          <h2 id="dpName"></h2>
          <p id="dpContinent"></p>
        </div>
      </div>
      <div class="dp-tabs">
        <button class="dp-tab active" data-tab="info"     onclick="setDetailTab('info')">Info</button>
        <button class="dp-tab"        data-tab="holidays" onclick="setDetailTab('holidays')">Holidays</button>
        <button class="dp-tab"        data-tab="climate"  onclick="setDetailTab('climate')">Climate</button>
        <button class="dp-tab"        data-tab="economy"  onclick="setDetailTab('economy')">Economy</button>
      </div>
      <div id="dtInfo">
        <div class="dp-grid">
          <div class="dp-field"><label id="lblCapital">Capital</label><span id="dpCapital"></span></div>
          <div class="dp-field"><label id="lblPop">Population</label><span id="dpPop"></span></div>
          <div class="dp-field"><label id="lblArea">Area</label><span id="dpArea"></span></div>
          <div class="dp-field"><label id="lblCurrency">Currency</label><span id="dpCurrency"></span></div>
          <div class="dp-field"><label id="lblLang">Languages</label><span id="dpLang"></span></div>
          <div class="dp-field"><label id="lblTel">Tel Code</label><span id="dpTel"></span></div>
          <div class="dp-field"><label id="lblTimezone">Time Zone</label><span id="dpTimezone"></span></div>
          <div class="dp-field" style="grid-column: 1 / -1"><label id="lblExRate">Exchange Rate</label><span id="dpExRate">—</span></div>
          <div id="dpExRateTime" style="grid-column: 1 / -1; font-size: 0.7rem; color: var(--text-dim); margin-top: -4px; display: none;"></div>
          <div class="dp-field" style="grid-column: 1 / -1"><label id="lblMinWage">Min. Wage (USD/month)</label><span id="dpMinWage">—</span></div>
        </div>
        <div class="dp-desc" id="dpDesc"></div>
      </div>
      <div id="dtHolidays" style="display:none"></div>
      <div id="dtClimate"  style="display:none">
        <div id="dtClimateControls" style="display:flex;gap:4px;margin:4px 0 6px;flex-wrap:wrap;"></div>
        <div id="dtClimateTable"></div>
      </div>
      <div id="dtEconomy"  style="display:none">
        <div id="dtEconomyControls" style="display:flex;gap:4px;margin:4px 0 6px;flex-wrap:wrap;"></div>
        <div id="dtEconomyTable"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

// ── Language functions ──────────────────────────────────────────────────────
function toggleLang() {
  lang = lang === 'en' ? 'ja' : 'en';
  applyLang();
}

function applyLang() {
  const u = UI[lang];
  document.getElementById('pageTitle').textContent  = u.title;
  document.getElementById('langBtn').textContent    = u.langBtn;
  document.getElementById('searchInput').placeholder= u.placeholder;
  document.getElementById('clearBtn').textContent   = u.clear;
  document.getElementById('lblCapital').textContent = u.capital;
  document.getElementById('lblPop').textContent     = u.pop;
  document.getElementById('lblArea').textContent    = u.area;
  document.getElementById('lblCurrency').textContent = u.currency;
  document.getElementById('lblLang').textContent     = u.langLabel;
  document.getElementById('lblTel').textContent      = u.tel;
  document.getElementById('lblTimezone').textContent = u.timezone;
  document.getElementById('lblExRate').textContent    = u.exrate;
  document.getElementById('lblMinWage').textContent   = u.minwage;
  document.getElementById('dpPlaceholder').textContent = u.hint;
  renderLegend();
  filterCountries();
  if (selectedId) showDetail(selectedId);
}

// ── Legend ─────────────────────────────────────────────────────────────────
function renderLegend() {
  const u = UI[lang];
  const leg = document.getElementById('legend');
  const items = Object.entries(u.continents).map(([code, name]) =>
    `<div class="legend-item${activeContinent === code ? ' active' : ''}" onclick="toggleContinent('${code}')">
       <div class="legend-dot" style="background:${CONTINENT_COLOR[code]||'#636e72'}"></div>
       ${name}
     </div>`
  ).join('');
  leg.innerHTML = items;
}

function toggleContinent(code) {
  activeContinent = (activeContinent === code) ? null : code;
  renderLegend();
  applyFilter();
}

// ── Filter + search ─────────────────────────────────────────────────────────
function getCountryName(id) {
  const d = COUNTRIES[id];
  if (!d) return null;
  return lang === 'en' ? d[0] : d[1];
}

function filterCountries() {
  applyFilter();
}

function applyFilter() {

  if (!gSel) return;
  gSel.selectAll('.country-path').each(function(d) {
    const id = +d.id;

    const matchSearch = !q || name.includes(q);
    const visible = matchContinent && matchSearch;
    d3.select(this).classed('dimmed', !visible);

    if (q && sgName === q) showDetail(702);

  // If search matches exactly one country-path, highlight it

// ── Exchange Rate ───────────────────────────────────────────────────────────
const _exRateCache = {};

function formatRate(rate) {
  if (rate >= 10000) return rate.toLocaleString(undefined, {maximumFractionDigits: 0});
  if (rate >= 100)   return rate.toFixed(1);
  if (rate >= 10)    return rate.toFixed(2);
  if (rate >= 1)     return rate.toFixed(3);
  return rate.toFixed(4);
}

function updateExRateTime(fetchTime) {
  const el = document.getElementById('dpExRateTime');
  if (!fetchTime) { el.style.display = 'none'; return; }
  try {
    const fmt = new Intl.DateTimeFormat(undefined, {
      timeZone: _appTz,
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
      hour12: false
    });
    el.textContent = `as of ${fmt.format(new Date(fetchTime))}  (${_appTz})`;
    el.style.display = '';
  } catch (_) {
    el.textContent = `as of ${new Date(fetchTime).toLocaleString()}`;
    el.style.display = '';
  }
}

async function loadExRate(currencyCode) {
  const el = document.getElementById('dpExRate');
  if (!currencyCode) { el.textContent = '—'; return; }
  const now = Date.now();
  const cached = _exRateCache[currencyCode];
  if (cached && (now - cached.fetchTime) < 3600000) {
    displayExRate(currencyCode, cached.rates, cached.fetchTime, el);
    return;
  }
  try {
    const resp = await fetch(`https://open.er-api.com/v6/latest/${currencyCode}`);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const json = await resp.json();
    if (!json.rates) throw new Error('No rates');
    _exRateCache[currencyCode] = { rates: json.rates, fetchTime: now };
    displayExRate(currencyCode, json.rates, now, el);
  } catch (_) {
    el.textContent = 'N/A';
  }
}

function displayExRate(code, rates, fetchTime, el) {
  if (!rates || !code) { el.textContent = 'N/A'; return; }
  const lines = [];
  if (code !== 'USD') {
    const r = rates['USD'];
    if (r != null && r > 0) lines.push(`1 USD = ${formatRate(1 / r)} ${code}`);
  }
  if (code !== 'JPY') {
    const r = rates['JPY'];
    if (r != null) lines.push(`1 ${code} = ${r.toFixed(2)} JPY`);
  }
  if (code === 'USD') {
    const r = rates['JPY'];
    if (r != null) lines.unshift(`1 USD = ${r.toFixed(2)} JPY`);
  }
  if (code === 'JPY') {
    const r = rates['USD'];
    if (r != null) lines.unshift(`1 JPY = ${formatRate(r)} USD`);
  }
  el.innerHTML = lines.length ? lines.join('<br>') : 'N/A';
  updateExRateTime(fetchTime);
}

async function loadHolidays(id) {
  const data = COUNTRIES[id];
  const alpha2 = data && data[13];
  const el = document.getElementById('dtHolidays');
  if (!alpha2) { el.innerHTML = '<div class="dp-unavail">Not available for this country.</div>'; return; }
  const year = new Date().getFullYear();
  const key = alpha2 + year;
  if (_holidayCache[key]) { renderHolidays(_holidayCache[key]); return; }
  el.innerHTML = '<div class="dp-loading">Loading...</div>';

  if (HOLIDAY_ALT_API[alpha2]) {
    try {
      const res = await fetch(HOLIDAY_ALT_API[alpha2](year));
      if (!res.ok) throw new Error();
      const json = await res.json();
      const list = json.holidays.map(h => ({
        date:      h.observed_date || h.date,
        localName: h.local_name,
        name:      h.name,
      }));
      _holidayCache[key] = list;
      renderHolidays(list);
    } catch {
      el.innerHTML = '<div class="dp-unavail">Failed to load holiday data.</div>';
    }
    return;
  }

  try {
    const res = await fetch(`https://date.nager.at/api/v3/PublicHolidays/${year}/${alpha2}`);
    if (!res.ok) throw new Error();
    const list = await res.json();
    _holidayCache[key] = list;
    renderHolidays(list);
  } catch {
    el.innerHTML = '<div class="dp-unavail">Failed to load holiday data.</div>';
  }
}

async function loadClimate(id) {
  const data = COUNTRIES[id];
  const coords = data && data[14];
  const tbl = document.getElementById('dtClimateTable');
  renderClimateControls();
  if (!coords) { tbl.innerHTML = '<div class="dp-unavail">Not available for this country.</div>'; return; }
  const [lat, lon] = coords;
  const latestYear = new Date().getFullYear() - 1;
  const startYear  = latestYear - _climateYears + 1;
  const key = `${lat},${lon},${_climateYears}`;
  if (_climateCache[key]) { renderClimate(_climateCache[key], startYear, latestYear); return; }
  tbl.innerHTML = '<div class="dp-loading">Loading...</div>';
  try {
    const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${startYear}-01-01&end_date=${latestYear}-12-31&daily=temperature_2m_max,temperature_2m_min,temperature_2m_mean,precipitation_sum&timezone=GMT`;
    const res = await fetch(url);
    if (!res.ok) throw new Error();
    const json = await res.json();
    const monthly = aggregateMonthly(json.daily);
    _climateCache[key] = monthly;
    renderClimate(monthly, startYear, latestYear);
  } catch {
    tbl.innerHTML = '<div class="dp-unavail">Failed to load climate data.</div>';
  }
}

function aggregateMonthly(daily) {
  // Group daily data into year-month buckets first
  const byYearMonth = {};
  daily.time.forEach((t, i) => {
    const [yr, mo] = t.split('-');
    const key = `${yr}-${mo}`;
    if (!byYearMonth[key]) byYearMonth[key] = { max:[], min:[], mean:[], rain:[] };
    const b = byYearMonth[key];
    if (daily.temperature_2m_max[i]  != null) b.max.push(daily.temperature_2m_max[i]);
    if (daily.temperature_2m_min[i]  != null) b.min.push(daily.temperature_2m_min[i]);
    if (daily.temperature_2m_mean[i] != null) b.mean.push(daily.temperature_2m_mean[i]);
    if (daily.precipitation_sum[i]   != null) b.rain.push(daily.precipitation_sum[i]);
  });
  // Per year-month: average daily temps, sum daily rain → then average across years per month
  const buckets = Array.from({length: 12}, () => ({max:[], min:[], mean:[], rain:[]}));
  const avg = a => a.length ? a.reduce((s,v)=>s+v,0)/a.length : null;
  const sum = a => a.length ? a.reduce((s,v)=>s+v,0) : null;
  Object.entries(byYearMonth).forEach(([key, b]) => {
    const m = parseInt(key.split('-')[1]) - 1;
    if (b.max.length)  buckets[m].max.push(avg(b.max));
    if (b.min.length)  buckets[m].min.push(avg(b.min));
    if (b.mean.length) buckets[m].mean.push(avg(b.mean));
    if (b.rain.length) buckets[m].rain.push(sum(b.rain));
  });
  return {
    temperature_2m_max:  buckets.map(b => avg(b.max)),
    temperature_2m_min:  buckets.map(b => avg(b.min)),
    temperature_2m_mean: buckets.map(b => avg(b.mean)),
    precipitation_sum:   buckets.map(b => avg(b.rain)),
  };
}

    { code: 'NY.GNP.PCAP.CD',    labelEN: 'GNI per Capita',  labelJA: '一人当たりGNI',  fmt: 'usd',       value: 33040,        yearLabel: '2023' },
  ],
};

function fmtEconValue(value, fmt) {
  if (value == null) return '—';
  switch (fmt) {
    case 'usd_large':
      if (value >= 1e12) return '$' + (value / 1e12).toFixed(2) + 'T';
      if (value >= 1e9)  return '$' + (value / 1e9).toFixed(1)  + 'B';
      if (value >= 1e6)  return '$' + (value / 1e6).toFixed(1)  + 'M';
      return '$' + value.toLocaleString();
    case 'usd':
      return '$' + Math.round(value).toLocaleString();
    case 'pct':
      return value.toFixed(1) + '%';
    default:
      return value.toFixed(2);
  }
}

function renderEconomyControls(onlyLatest = false) {
  const ctrl = document.getElementById('dtEconomyControls');
  const allOptions = [
    { years: 1,  label: 'Latest'  },
    { years: 5,  label: '5yr avg' },
    { years: 10, label: '10yr avg'},
    { years: 30, label: '30yr avg'},
  ];
  const options = onlyLatest ? allOptions.slice(0, 1) : allOptions;
  ctrl.innerHTML = options.map(o =>
    `<button class="dp-tab${_economyYears === o.years ? ' active' : ''}" onclick="selectEconomyYears(${o.years})">${o.label}</button>`
  ).join('');
}

function selectEconomyYears(years) {
  _economyYears = years;
  if (selectedId != null) loadEconomy(selectedId);
}

async function loadEconomy(id) {
  const data = COUNTRIES[id];
  const alpha2 = data && data[13];
  const tbl = document.getElementById('dtEconomyTable');
  const isStatic = !!(alpha2 && ECONOMY_STATIC[alpha2]);
  if (isStatic) _economyYears = 1;
  renderEconomyControls(isStatic);
  if (!alpha2) { tbl.innerHTML = '<div class="dp-unavail">Not available for this country.</div>'; return; }
  if (isStatic) { renderEconomy(ECONOMY_STATIC[alpha2], true); return; }
  const mrv = _economyYears;
  const key = `${alpha2},${mrv}`;
  if (_economyCache[key]) { renderEconomy(_economyCache[key]); return; }
  tbl.innerHTML = '<div class="dp-loading">Loading...</div>';
  try {
    const results = await Promise.all(
      ECONOMY_INDICATORS.map(ind =>
        fetch(`https://api.worldbank.org/v2/country/${alpha2}/indicator/${ind.code}?format=json&mrv=${mrv}&per_page=${mrv}`)
          .then(r => r.ok ? r.json() : null)
          .catch(() => null)
      )
    );
    const processed = ECONOMY_INDICATORS.map((ind, i) => {
      const raw = results[i];
      const points = (raw && raw[1]) ? raw[1].filter(p => p.value != null) : [];
      if (!points.length) return { ...ind, value: null, yearLabel: '—' };
      const avg = points.reduce((s, p) => s + p.value, 0) / points.length;
      const years = points.map(p => parseInt(p.date)).filter(Boolean).sort();
      const yearLabel = mrv === 1 ? String(years[years.length - 1]) : `${years[0]}–${years[years.length - 1]}`;
      return { ...ind, value: avg, yearLabel };
    });
    _economyCache[key] = processed;
    renderEconomy(processed);
  } catch {
    tbl.innerHTML = '<div class="dp-unavail">Failed to load economy data.</div>';
  }
}

function renderEconomy(processed, isStatic = false) {
  const tbl = document.getElementById('dtEconomyTable');
  const th1 = lang === 'en' ? 'Indicator' : '指標';
  const th2 = lang === 'en' ? 'Value'     : '値';
  const th3 = lang === 'en' ? 'Year'      : '年';
  const rows = processed.map(ind => {
    const label = lang === 'en' ? ind.labelEN : ind.labelJA;
    const val   = fmtEconValue(ind.value, ind.fmt);
    return `<tr><td>${label}</td><td style="text-align:right;font-weight:600">${val}</td><td style="color:var(--text-dim);white-space:nowrap">${ind.yearLabel}</td></tr>`;
  }).join('');
  const note = isStatic
    ? `<div style="font-size:0.7rem;color:var(--text-dim);margin-top:4px">* Source: IMF World Economic Outlook 2024 (static data)</div>`
    : '';
  tbl.innerHTML = `<table class="dp-table"><thead><tr><th>${th1}</th><th style="text-align:right">${th2}</th><th>${th3}</th></tr></thead><tbody>${rows}</tbody></table>${note}`;
}

// ── Projection switch ────────────────────────────────────────────────────────
let projType = 'flat';

function switchProjection(type) {
  if (type === projType || !gSel) return;
  projType = type;
  document.getElementById('btnGlobe').classList.toggle('active', type === 'globe');
  document.getElementById('btnFlat').classList.toggle('active', type === 'flat');

  const width = 500;
  if (type === 'globe') {
    const height = 250;
    _projection = d3.geoOrthographic()
      .scale(120)
      .translate([width / 2, height / 2])
      .clipAngle(90)
      .rotate(currentRotate);
    gSel.select('.sphere').style('display', null);
    document.getElementById('zoomSlider').value = 120;
  } else {
    currentRotate[1] = 0; currentRotate[2] = 0;
    _projection = d3.geoNaturalEarth1()
      .scale(80)
      .translate([width / 2, width / 4])
      .rotate(currentRotate);
    gSel.select('.sphere').style('display', 'none');
    document.getElementById('zoomSlider').value = 90;
  }
  _path = d3.geoPath().projection(_projection);
  redrawPaths();
}

// ── Rotation helpers ────────────────────────────────────────────────────────
function redrawPaths() {
  if (!gSel || !_path) return;
  gSel.selectAll('path').attr('d', _path);
  drawSgMarker();
}

function rotateBy(deg) {
  currentRotate[0] += deg;
  _projection.rotate(currentRotate);
  redrawPaths();
}

// ── Reset rotation ──────────────────────────────────────────────────────────
function resetRotation() {
  currentRotate = [0, 0, 0];
  _projection.rotate(currentRotate);
  redrawPaths();
}

// ── Zoom ─────────────────────────────────────────────────────────────────────
function applyZoom(value) {
  if (!_projection) return;
  _projection.scale(+value);
  redrawPaths();
}

// ── Map rendering ───────────────────────────────────────────────────────────
async function initMap() {
  const world = await d3.json('/map/countries-110m.json');
  const countries = topojson.feature(world, world.objects.countries);

  const width = 500;
  _projection = d3.geoNaturalEarth1()
    .scale(90)
    .translate([width / 2, width / 4])
    .rotate(currentRotate);
  _path = d3.geoPath().projection(_projection);
  const projection = _projection;
  const path = _path;

  svgSel = d3.select('#map-svg');
  gSel   = svgSel.append('g');

  // Ocean sphere (hidden by default in flat mode)
  gSel.append('path')
    .datum({ type: 'Sphere' })
    .attr('class', 'sphere')
    .attr('d', path)
    .style('display', 'none');

  // Graticule
  gSel.append('path')
    .datum(d3.geoGraticule()())
    .attr('class', 'graticule')
    .attr('d', path);

  const tooltip = document.getElementById('tooltip');

  // Countries
  gSel.selectAll('.country-path')
    .data(countries.features)
    .join('path')
    .attr('class', 'country-path')
    .attr('d', path)
    .attr('fill', d => {
      const id = +d.id;
      const data = COUNTRIES[id];
      const continent = data ? data[4] : (ISO_CONTINENT[id] || '??');
      return CONTINENT_COLOR[continent] || '#636e72';
    })
    .on('mousemove', function(event, d) {
      const id = +d.id;
      const data = COUNTRIES[id];
      const name = data ? (lang === 'en' ? data[0] : data[1]) : ('ISO ' + id);
      tooltip.textContent = name;
      tooltip.classList.add('visible');
      tooltip.style.left = (event.clientX + 14) + 'px';
      tooltip.style.top  = (event.clientY - 28) + 'px';
      if (!d3.select(this).classed('selected')) {
        d3.select(this).classed('highlighted', true);
      }
    })
    .on('mouseleave', function() {
      tooltip.classList.remove('visible');
      d3.select(this).classed('highlighted', false);
    })
    .on('click', function(event, d) {
      const id = +d.id;
      // Deselect previous
      gSel.selectAll('.country-path').classed('selected', false);
      gSel.select('.sg-marker').classed('sg-selected', false)
        .attr('stroke', '#1a1a2e').attr('stroke-width', 0.5);
      d3.select(this).classed('selected', true).classed('highlighted', false);
      showDetail(id);
    });

  // Drag → rotation (native events)
  let _dragging = false, _dragStartX = null, _dragStartY = null, _dragStartRot = null;
  const svgEl = svgSel.node();

  svgEl.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    _dragging     = true;
    _dragStartX   = e.clientX;
    _dragStartY   = e.clientY;
    _dragStartRot = [...currentRotate];
    svgEl.style.cursor = 'grabbing';
    e.preventDefault();
  });
  document.addEventListener('mousemove', (e) => {
    if (!_dragging) return;
    const dx = e.clientX - _dragStartX;
    const dy = e.clientY - _dragStartY;
    currentRotate[0] = _dragStartRot[0] - dx * 0.4;
    if (projType === 'globe') {
      currentRotate[1] = Math.max(-85, Math.min(85, _dragStartRot[1] + dy * 0.4));
    }
    _projection.rotate(currentRotate);
    redrawPaths();
  });
  document.addEventListener('mouseup', () => {
    if (!_dragging) return;
    _dragging = false;
    svgEl.style.cursor = 'grab';
  });

  // Two-finger trackpad swipe → rotation (macOS)
  svgEl.addEventListener('wheel', (e) => {
    e.preventDefault();
    if (Math.abs(e.deltaX) >= Math.abs(e.deltaY)) {
      // Horizontal swipe → horizontal rotation
      currentRotate[0] -= e.deltaX * 0.3;
    } else if (projType === 'globe') {
      // Vertical swipe → vertical rotation (globe only, clamped to ±85°)
      currentRotate[1] = Math.max(-85, Math.min(85, currentRotate[1] + e.deltaY * 0.3));
    }
    _projection.rotate(currentRotate);
    redrawPaths();
  }, { passive: false });

  // Initial render
  renderLegend();
  drawSgMarker();
}

initMap();
</script>
